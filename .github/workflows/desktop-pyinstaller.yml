name: Desktop PyInstaller Build

on:
  push:
    paths:
      - 'desktop_app/**'
      - 'scripts/build_desktop.sh'
      - 'requirements.txt'
      - '.github/workflows/desktop-pyinstaller.yml'
  pull_request:
    paths:
      - 'desktop_app/**'
      - 'scripts/build_desktop.sh'
      - 'requirements.txt'
      - '.github/workflows/desktop-pyinstaller.yml'

jobs:
  build-desktop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build desktop executable
        run: ./scripts/build_desktop.sh
