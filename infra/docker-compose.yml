services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monitor
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/monitor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super-secret
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    command: celery -A app.workers.celery_app worker --beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/monitor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super-secret
    depends_on:
      - backend
      - redis
      - db

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pg_data:
